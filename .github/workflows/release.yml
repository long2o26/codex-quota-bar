name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh
      - run: ./scripts/package.sh
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/CodexQuotaBar.zip \
            --title "$GITHUB_REF_NAME" \
            --notes "Download CodexQuotaBar.zip, unzip it, and open CodexQuotaBar.app."
